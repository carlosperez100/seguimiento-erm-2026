name: Tracker encuestas online
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: commit-main
  cancel-in-progress: false
jobs:
  capturar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r tracker/requirements.txt
      - run: python tracker/encuestas_scraper.py
      - name: Commit
        run: |
          git config user.name "tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/encuestas.json
          if git diff --staged --quiet; then
            echo "Sin cambios"
          else
            git commit -m "tracker: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase --autostash origin main || true
            git push
          fi
